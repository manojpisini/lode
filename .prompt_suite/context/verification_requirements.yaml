# UPPS-00 Verification Requirements
# Generated: 2026-07-11
# Suite: universal-project-prompt-suite v3.2.0

required_commands:
  - cargo check --workspace
  - cargo test --workspace
  - cargo clippy --workspace -- -D warnings

optional_commands:
  - cargo fmt --all -- --check
  - cargo deny check
  - cargo audit

forbidden_commands:
  - cargo publish
  - git push
  - rm -rf target/

compatibility_requirements:
  - rust edition 2021
  - stable-x86_64-pc-windows-gnu toolchain
  - MSYS2 ucrt64 in PATH on Windows

acceptance_criteria:
  - cargo check --workspace passes with zero errors
  - cargo test --workspace passes all tests
  - cargo clippy --workspace -- -D warnings passes
  - no secrets exposed in output files
  - all output files follow lowercase_snake_case convention
  - output file paths comply with output_contract declarations

performance_budgets: {}
