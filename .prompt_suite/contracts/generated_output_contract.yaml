# UPPS-01 Suite-Wide Generated Output Storage Rules
# Generated: 2026-07-11
# Suite: universal-project-prompt-suite v3.2.0

folder_ownership:
  .prompt_suite:
    content: prompt context, contracts, run manifests, suite state
    prohibited: product documentation, source code, test results presented as docs
  docs:
    content: maintained user, developer, architecture, reference, operations documentation
    prohibited: prompt context, raw logs, transient run output
  reports:
    content: human-readable audits, reviews, assessments, verification reports
    prohibited: source files, raw runtime state
  plans:
    content: proposed or approved remediation, migration, rollout, cleanup, improvement plans
    prohibited: evidence claimed as completed work
  artifacts:
    content: json, jsonl, csv, mermaid, inventories, matrices, scorecards, evidence manifests
    prohibited: unredacted secrets
  logs:
    content: sanitized command logs, execution traces, incident timelines, validation transcripts
    prohibited: maintained documentation

naming_convention: lowercase_snake_case

overwrite_policy: preserve_existing

create_directories: true

forbidden_patterns:
  - docs/prompts/
  - prompts/output/
  - output/
  - outputs/
  - "*/Final-*/**"
  - "*/*_FINAL.*"
  - "*/* FINAL.*"
  - "*/* final.*"

source_of_truth_rule: >
  Every topic must have one primary source of truth.
  Do not duplicate content across docs, reports, and artifacts.
  Link to the source of truth.

versioning: |
  Canonical current artifact uses stable canonical filename.
  Previous versions archived under:
  <artifact_root>/history/<yyyy_mm_dd_hhmmss>/<canonical_filename>
