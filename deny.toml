[advisories]
ignore = [
    { id = "RUSTSEC-2024-0436", reason = "paste 1.0.15 is a transitive dependency via ratatui 0.28; no newer paste exists. Review by 2026-10-16." },
]

[licenses]
allow = [
    "Apache-2.0",
    "BSD-3-Clause",
    "CC0-1.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []