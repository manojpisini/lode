name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-gnu
            os: windows-latest
            ext: .zip
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: .tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            ext: .tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSYS2 (Windows GNU)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          path-type: inherit
          update: false
          install: mingw-w64-ucrt-x86_64-gcc

      - name: Install Rust stable
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p lode-cli -p lode-lsp

      - name: Create archive
        shell: bash
        run: |
          VERSION="${{ github.ref_name }}"
          TARGET="${{ matrix.target }}"
          DIR="lode-$VERSION-$TARGET"
          BIN_DIR="target/$TARGET/release"
          mkdir -p "$DIR"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "$BIN_DIR/lode.exe" "$DIR/"
            cp "$BIN_DIR/lode-lsp.exe" "$DIR/"
            7z a "$DIR${{ matrix.ext }}" "$DIR"
          else
            cp "$BIN_DIR/lode" "$DIR/"
            cp "$BIN_DIR/lode-lsp" "$DIR/"
            tar czf "$DIR${{ matrix.ext }}" "$DIR"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lode-${{ github.ref_name }}-${{ matrix.target }}
          path: lode-${{ github.ref_name }}-${{ matrix.target }}${{ matrix.ext }}

  sbom:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked
      - name: Generate SBOM
        run: cargo cyclonedx --workspace --all --output-dir sbom
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/

  release:
    needs: [build, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        working-directory: artifacts
        run: |
          for f in */*; do
            sha256sum "$f" >> checksums.txt
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*/*
          generate_release_notes: true
